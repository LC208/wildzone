services:
  db:
    image: postgres:16
    container_name: postgres
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    network_mode: host
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: django
    command: ./entrypoint.sh
    volumes:
      - ./backend:/app
      - ${HOST_PROJECT_PATH}:${HOST_PROJECT_PATH}
    network_mode: host
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: vite
    network_mode: host
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data: